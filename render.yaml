services:
  - type: web
    name: zipo
    runtime: node
    region: singapore
    plan: starter
    buildCommand: npm run build:all
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: zipo-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: LINE_CHANNEL_ID
        value: ""
      - key: LINE_CHANNEL_SECRET
        value: ""
      - key: LINE_ACCESS_TOKEN
        value: ""
      - key: LLM_API_KEY
        value: ""
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: PORT
        value: "10000"

databases:
  - name: zipo-db
    databaseName: zipo
    ipAllowList: []
