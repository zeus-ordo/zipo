services:
  - type: web
    name: zipo
    runtime: node
    region: singapore
    plan: free
    installCommand: npm install --include=dev
    buildCommand: npm install && npm install @types/node @types/express @types/bcryptjs @types/cors @types/jsonwebtoken @types/multer @types/xlsx @types/express-rate-limit && npm run build:all
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: LINE_CHANNEL_ID
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_ACCESS_TOKEN
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: PORT
        value: "10000"
